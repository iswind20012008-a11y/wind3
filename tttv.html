<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách thành viên nhóm</title>
    <style>
        .team-list {
            list-style-type: none; /* Bỏ dấu chấm đầu dòng */
            padding: 0;
        }
        .member {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: fit-content;
        }
        .member img {
            width: 50px;
            height: 50px;
            border-radius: 50%; /* Làm ảnh hình tròn */
            margin-right: 15px;
            object-fit: cover;
        }
        .member span {
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h2>Thành Viên Nhóm</h2>

    <ul class="team-list">
        <!-- Thành viên 1 -->
        <li class="member">
            <img src="https://via.placeholder.com" alt="Ảnh Nguyễn Văn A">
            <span>Nguyễn Văn A</span>
        </li>

        <!-- Thành viên 2 -->
        <li class="member">
            <img src="https://via.placeholder.com" alt="Ảnh Trần Thị B">
            <span>Trần Thị B</span>
        </li>

        <!-- Thành viên 3 -->
        <li class="member">
            <img src="https://via.placeholder.com" alt="Ảnh Lê Văn C">
            <span>Lê Văn C</span>
        </li>
    </ul>

</body>
</html>
