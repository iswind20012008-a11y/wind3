<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách thành viên nhóm</title>
    <style>
        .team-list {
            list-style-type: none;
            padding: 0;
        }
        .member {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: fit-content;
        }
        .member img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }
        .member span {
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h2>Thành Viên Nhóm</h2>

    <ul class="team-list">
    
        <li class="member">
            <img src="nva.jpg" alt="Ảnh Nguyễn Văn A">
            <span>Nguyễn Văn An</span>
        </li>

     
        <li class="member">
            <img src="https://via.placeholder.com" alt="--------">
            <span>-------</span>
        </li>

        <li class="member">
            <img src="https://via.placeholder.com" alt="Ả--------">
            <span>-------</span>
        </li>
    </ul>

</body>
</html>
